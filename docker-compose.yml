services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: clinicmind
      POSTGRES_PASSWORD: clinicmind
      POSTGRES_DB: clinicmind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinicmind"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://clinicmind:clinicmind@db:5432/clinicmind
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      AUTH_URL: http://localhost:3000
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      DEVELOPER_EMAIL: ${DEVELOPER_EMAIL:-}
    depends_on:
      db:
        condition: service_healthy

  # Servicio one-shot: crea tablas e inserta datos de ejemplo
  # Usar con: docker compose --profile setup run --rm db-setup
  db-setup:
    build:
      context: .
      target: builder
    working_dir: /app
    entrypoint: ["sh", "-c", "npx prisma db push && npx tsx prisma/seed.ts"]
    environment:
      DATABASE_URL: postgresql://clinicmind:clinicmind@db:5432/clinicmind
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - setup

volumes:
  pgdata:
